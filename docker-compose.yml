version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: haberfoni_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-Pr0duct10n_Root!2026}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-haberfoni}
      MYSQL_USER: ${MYSQL_USER:-haberfoni_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-Haberfoni_Secur3!DB}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app_network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}" ]
      interval: 10s
      timeout: 20s
      retries: 10
      start_period: 30s

  backend:
    build: .
    container_name: haberfoni_backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: mysql://${MYSQL_USER:-haberfoni_user}:${MYSQL_PASSWORD:-Haberfoni_Secur3!DB}@db:3306/${MYSQL_DATABASE:-haberfoni}
      NODE_ENV: production
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ../public/uploads:/public/uploads
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  db_data:
